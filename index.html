<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javier Bear Grill</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #111;
  color: white;
}

h1 {
  text-align: center;
  padding: 20px;
}

#menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.admin-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 100%;
  background: #222;
  padding: 20px;
  box-shadow: -5px 0 15px rgba(0,0,0,0.5);
  display: none;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Javier Bear Grill</h1>

<div id="menu"></div>

<div class="admin-panel" id="adminPanel">
  <h2>Panel Admin</h2>
  <button onclick="refrescarMenu()">Refrescar Menú</button>
  <button onclick="cerrarAdmin()">Cerrar</button>
</div>

<script>

// ==========================
// CARGAR MENU
// ==========================

async function cargarMenu() {
  try {
    const res = await fetch("https://uazonbacmpwuznugirru.supabase.co/functions/v1/loyverse-menu");
    const data = await res.json();

    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    data.forEach(item => {

      const price = item?.variants?.[0]?.stores?.[0]?.price ?? "No disponible";

      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${item.item_name}</h3>
        <p>Precio: $${price}</p>
      `;
      menu.appendChild(div);
    });

  } catch (error) {
    document.getElementById("menu").innerHTML = "<p>Error cargando menú</p>";
  }
}

cargarMenu();

// ==========================
// 5 TOQUES SECRETOS
// ==========================

let tapCount = 0;
let tapTimer;

document.body.addEventListener("click", () => {
  tapCount++;

  clearTimeout(tapTimer);

  tapTimer = setTimeout(() => {
    tapCount = 0;
  }, 2000);

  if (tapCount === 5) {
    tapCount = 0;
    abrirAdmin();
  }
});

function abrirAdmin() {
  const clave = prompt("Acceso Admin - Ingresa clave:");

  if (clave === "javier2026") {
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Clave incorrecta");
  }
}

function cerrarAdmin() {
  document.getElementById("adminPanel").style.display = "none";
}

// ==========================
// REFRESCAR MANUAL
// ==========================

async function refrescarMenu() {
  await fetch("https://uazonbacmpwuznugirru.supabase.co/functions/v1/loyverse-menu?refresh=javier2026");
  alert("Menú actualizado");
  cargarMenu();
}

</script>

</body>
</html>
