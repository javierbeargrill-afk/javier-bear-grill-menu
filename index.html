<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javier Bear Grill | Menú Oficial</title>
<meta name="description" content="Menú oficial de Javier Bear Grill en Panamá. Hamburguesas smash, pollos asados, picadas y delivery propio.">

<style>
:root {
  --primary: #ffcc00;
  --dark: #0f0f0f;
  --card: #1a1a1a;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--dark);
  color: white;
}

header {
  background: black;
  padding: 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

h1 {
  margin: 0;
  color: var(--primary);
}

.menu-container {
  padding: 20px;
  display: grid;
  gap: 15px;
}

.product {
  background: var(--card);
  padding: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.product button {
  background: var(--primary);
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.cart-button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--primary);
  color: black;
  padding: 15px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
}

.cart-panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: 90%;
  max-width: 400px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
  overflow-y: auto;
  z-index: 2000;
}

.cart-panel.active { right: 0; }

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.qty-controls button {
  background: var(--primary);
  border: none;
  padding: 3px 8px;
  margin: 0 3px;
  cursor: pointer;
}

.remove-btn {
  background: red;
  border: none;
  color: white;
  padding: 3px 6px;
  cursor: pointer;
  margin-left: 5px;
}

.checkout-btn {
  background: var(--primary);
  border: none;
  padding: 12px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
}

@media(min-width:768px){
  .menu-container{
    grid-template-columns: repeat(2,1fr);
  }
}
</style>
</head>

<body>

<header>
  <h1>Javier Bear Grill</h1>
  <p>Smash Burgers · Pollos · Picadas</p>
</header>

<main class="menu-container">

  <div class="product">
    <div>
      <strong>Hamburguesa Clásica</strong><br>
      PAB 3.00
    </div>
    <button onclick="addToCart('Hamburguesa Clásica',3)">Agregar</button>
  </div>

  <div class="product">
    <div>
      <strong>La Rompe Yema</strong><br>
      PAB 3.99
    </div>
    <button onclick="addToCart('La Rompe Yema',3.99)">Agregar</button>
  </div>

</main>

<div class="cart-button" onclick="toggleCart()">
  🛒 (<span id="cart-count">0</span>)
</div>

<div class="cart-panel" id="cart">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">Tu Pedido</h2>
    <button onclick="toggleCart()" style="background:none;border:none;color:white;font-size:22px;cursor:pointer;">✕</button>
  </div>

  <div id="cart-items"></div>
  <h3>Total: PAB <span id="cart-total">0.00</span></h3>
  <button class="checkout-btn" onclick="checkout()">Enviar por WhatsApp</button>
</div>

<script>
let cart = [];

function addToCart(name, price){
  let existing = cart.find(item => item.name === name);
  if(existing){
    existing.qty += 1;
  } else {
    cart.push({name, price, qty:1});
  }
  updateCart();
}

function updateCart(){
  document.getElementById("cart-count").innerText =
    cart.reduce((sum,item)=>sum+item.qty,0);

  let container = document.getElementById("cart-items");
  container.innerHTML = "";
  let total = 0;

  cart.forEach((item,index)=>{
    total += item.price * item.qty;
    container.innerHTML += `
      <div class="cart-item">
        <div>
          <strong>${item.name}</strong><br>
          <div class="qty-controls">
            <button onclick="changeQty(${index},-1)">-</button>
            ${item.qty}
            <button onclick="changeQty(${index},1)">+</button>
          </div>
        </div>
        <div>
          PAB ${(item.price*item.qty).toFixed(2)}
          <button class="remove-btn" onclick="removeItem(${index})">X</button>
        </div>
      </div>
    `;
  });

  document.getElementById("cart-total").innerText = total.toFixed(2);
}

function changeQty(index,amount){
  cart[index].qty += amount;
  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }
  updateCart();
}

function removeItem(index){
  cart.splice(index,1);
  updateCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function checkout(){
  if(cart.length === 0){
    alert("Tu carrito está vacío");
    return;
  }

  let message = "Hola Javier Bear Grill 🍔%0A%0ANuevo pedido:%0A";
  let total = 0;

  cart.forEach(item=>{
    message += `- ${item.name} x${item.qty} PAB ${(item.price*item.qty).toFixed(2)}%0A`;
    total += item.price*item.qty;
  });

  message += `%0ATotal: PAB ${total.toFixed(2)}`;

  window.open(`https://wa.me/50765738924?text=${message}`,"_blank");
}
</script>

</body>
</html>
