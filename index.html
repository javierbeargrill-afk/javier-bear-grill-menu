<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Javier Bear Grill 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* CSS UNIFICADO Y OPTIMIZADO */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --yellow: #f5c518; --yellow-dark: #d4a800;
    --green: #25D366; --text: #f0f0f0; --muted: #888;
    --border: #2e2e2e; --red: #ff4444; --orange: #ff8800;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

  /* BANNER DE CERRADO (POPUP) */
  #closedBanner {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 30px;
  }
  #closedBanner.show { display: flex; }
  .closed-icon { font-size: 60px; margin-bottom: 10px; }
  .closed-title { font-family: 'Oswald', sans-serif; font-size: 28px; color: var(--yellow); text-transform: uppercase; }
  .closed-hours { margin: 20px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 15px; font-size: 14px; line-height: 1.8; }
  .closed-hours span { color: var(--yellow); font-weight: 700; }
  .btn-continuar {
    background: transparent; color: var(--yellow); border: 2px solid var(--yellow);
    padding: 10px 20px; border-radius: 30px; font-family: 'Oswald', sans-serif;
    text-transform: uppercase; cursor: pointer; transition: 0.3s;
  }
  .btn-continuar:hover { background: var(--yellow); color: #000; }

  /* BARRA DE HORARIO SUPERIOR */
  #scheduleBar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px; font-size: 13px; font-weight: 700; }
  .open-bar { background: #0d2b1a; color: var(--green); }
  .closed-bar { background: #2b0d0d; color: var(--red); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .open-bar .dot { background: var(--green); animation: pulse 2s infinite; }
  .closed-bar .dot { background: var(--red); }
  @keyframes pulse { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }

  /* HEADER */
  header { text-align: center; padding: 30px 20px; background: linear-gradient(180deg, #1a0a00 0%, #0f0f0f 100%); border-bottom: 1px solid #2a1800; }
  .header-title { font-family: 'Oswald', sans-serif; font-size: 32px; color: var(--yellow); text-transform: uppercase; letter-spacing: 2px; }

  /* MENU & CARDS */
  .category-block { margin: 10px 14px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .category-toggle { width: 100%; padding: 15px; background: var(--surface); border: none; color: var(--yellow); font-family: 'Oswald', sans-serif; text-align: left; font-size: 16px; cursor: pointer; display: flex; justify-content: space-between; }
  .category-body { display: none; padding: 10px; background: var(--bg); grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
  .category-body.open { display: grid; }
  .card { background: var(--surface); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-name { font-weight: 700; font-size: 16px; }
  .card-price { color: var(--yellow); font-family: 'Oswald'; font-size: 18px; }

  /* CONTROLES CANTIDAD */
  .qty-controls { display: flex; align-items: center; background: var(--surface2); border-radius: 20px; border: 1px solid var(--border); }
  .qty-btn { width: 30px; height: 30px; border: none; background: none; color: var(--yellow); font-weight: bold; cursor: pointer; }
  .qty-btn.plus { background: var(--yellow); color: #000; border-radius: 0 20px 20px 0; }
  .qty-val { width: 30px; text-align: center; font-size: 14px; }

  /* CARRITO Y BOTÓN ENVÍO */
  #carrito { padding: 20px; background: var(--surface); margin: 20px 14px; border-radius: 15px; border: 1px solid var(--border); }
  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 8px; }
  
  .btn-send { 
    width: 100%; padding: 15px; background: var(--green); border: none; color: #fff; 
    border-radius: 10px; font-family: 'Oswald'; font-size: 18px; cursor: pointer; transition: 0.3s;
  }
  .btn-send:disabled { background: #444 !important; color: #888 !important; cursor: not-allowed; filter: grayscale(1); }

  #floatCart { position: fixed; bottom: 20px; right: 20px; background: var(--yellow); color: #000; padding: 12px 20px; border-radius: 30px; font-weight: 800; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: none; cursor: pointer; z-index: 100; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: 0.3s; z-index: 1000; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="closedBanner">
  <div class="closed-icon">🔒</div>
  <div class="closed-title">Local Cerrado</div>
  <div class="closed-msg">No estamos recibiendo pedidos en este momento.</div>
  <div id="nextOpeningInfo" class="closed-hours">Cargando horario...</div>
  <button class="btn-continuar" onclick="cerrarPopup()">Ver menú de todos modos</button>
</div>

<div id="scheduleBar">
  <div class="dot"></div>
  <span id="scheduleText">Verificando...</span>
</div>

<header>
  <div class="header-title">Javier Bear Grill</div>
  <p style="color:var(--muted); font-size: 12px; letter-spacing: 2px;">SABOR A FUEGO</p>
</header>

<div id="menuContainer"></div>

<button id="floatCart" onclick="document.getElementById('carrito').scrollIntoView({behavior:'smooth'})">🛒 Carrito (<span id="cartCount">0</span>)</button>

<div id="carrito">
  <h3 style="font-family:'Oswald'; color:var(--yellow); margin-bottom:15px;">Finalizar Pedido</h3>
  <div id="listaItems" style="margin-bottom:15px; font-size:14px;"></div>
  <div style="border-top:1px solid var(--border); padding-top:10px; margin-bottom:15px;">
    <div style="display:flex; justify-content:space-between;"><span>Total:</span><span id="totalVal" style="color:var(--yellow); font-weight:800; font-size:20px;">$0.00</span></div>
  </div>
  
  <div class="form-group">
    <label>Nombre</label>
    <input type="text" id="nombre" placeholder="Tu nombre">
  </div>
  <div class="form-group">
    <label>Zona de Entrega</label>
    <select id="zona">
      <option value="La Valdeza">La Valdeza ($1.25)</option>
      <option value="Llano Largo">Llano Largo ($1.25)</option>
      <option value="Fuera de zona">Fuera de zona (Coord. por WA)</option>
    </select>
  </div>
  
  <button class="btn-send" id="btnEnviar" onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>
</div>

<div class="toast" id="toast"></div>

<script>
// CONFIGURACIÓN DE HORARIOS
const HORARIO = {
  0: { open: 13, close: 22, name: "Domingo" },
  5: { open: 15, close: 24, name: "Viernes" },
  6: { open: 13, close: 24, name: "Sábado" }
  // Lunes a Jueves se asume cerrado basado en tu solicitud previa
};

const CATEGORIAS = [
  { nombre: "🥳 Promociones", items: [
    {id:1, n:"Las tres Smash Burgers", p:11.99},
    {id:2, n:"Promo Brutalito", p:5.75}
  ]},
  { nombre: "🍗 Pollos Asados", items: [
    {id:3, n:"1 Pollo Entero", p:9.00},
    {id:4, n:"1/2 Pollo Asado", p:5.00},
    {id:5, n:"COMBO Pollo Entero", p:13.00}
  ]},
  { nombre: "🍔 Hamburguesas", items: [
    {id:6, n:"La Garra (Especial)", p:8.50},
    {id:7, n:"Doble Hamburguesa", p:4.75},
    {id:8, n:"La Rompe Yema", p:3.99}
  ]},
  { nombre: "🍟 Acompañantes", items: [
    {id:9, n:"Papas Fritas", p:1.75},
    {id:10, n:"Patacones", p:1.75},
    {id:11, n:"Yuca al Mojo", p:1.75}
  ]},
  { nombre: "🥤 Bebidas", items: [
    {id:12, n:"Soda Lata", p:1.00},
    {id:13, n:"Agua Botella", p:1.00},
    {id:14, n:"Soda 1.5L", p:2.75}
  ]}
];

let carrito = {};
let bannerForzadoCerrado = false;

function checkSchedule() {
  const now = new Date();
  const day = now.getDay();
  const hour = now.getHours();
  
  const hoy = HORARIO[day];
  const isOpen = hoy && hour >= hoy.open && hour < hoy.close;
  
  const bar = document.getElementById('scheduleBar');
  const txt = document.getElementById('scheduleText');
  const btn = document.getElementById('btnEnviar');
  const banner = document.getElementById('closedBanner');

  if (isOpen) {
    bar.className = "open-bar";
    txt.innerText = `Abierto ahora · Cerramos a las ${hoy.close > 12 ? hoy.close-12 : hoy.close}:00${hoy.close >= 12 ? 'pm' : 'am'}`;
    btn.disabled = false;
    btn.innerText = "Enviar Pedido por WhatsApp";
    banner.classList.remove('show');
  } else {
    bar.className = "closed-bar";
    const next = getNextOpening();
    txt.innerText = `Cerrado · Abrimos el ${next.dia} a las ${next.hora}`;
    btn.disabled = true;
    btn.innerText = "🚫 Local Cerrado";
    
    if (!bannerForzadoCerrado) {
      banner.classList.add('show');
      document.getElementById('nextOpeningInfo').innerHTML = `🕐 Próxima apertura:<br><span>${next.dia} a las ${next.hora}</span>`;
    }
  }
}

function getNextOpening() {
  const now = new Date();
  for (let i = 0; i < 7; i++) {
    const nextDate = new Date();
    nextDate.setDate(now.getDate() + i);
    const dayIndex = nextDate.getDay();
    const config = HORARIO[dayIndex];
    
    if (config) {
      if (i === 0 && now.getHours() < config.open) {
        return { dia: "Hoy", hora: (config.open > 12 ? config.open-12 : config.open) + ":00pm" };
      }
      if (i > 0) {
        return { dia: config.name, hora: (config.open > 12 ? config.open-12 : config.open) + ":00pm" };
      }
    }
  }
  return { dia: "Próximamente", hora: "--" };
}

function cerrarPopup() {
  bannerForzadoCerrado = true;
  document.getElementById('closedBanner').classList.remove('show');
}

function renderMenu() {
  const container = document.getElementById('menuContainer');
  CATEGORIAS.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'category-block';
    block.innerHTML = `
      <button class="category-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
        ${cat.nombre} <span>▼</span>
      </button>
      <div class="category-body">
        ${cat.items.map(item => `
          <div class="card">
            <div class="card-header">
              <span class="card-name">${item.n}</span>
              <span class="card-price">$${item.p.toFixed(2)}</span>
            </div>
            <div style="display:flex; justify-content:flex-end;">
              <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(${item.id}, '${item.n}', ${item.p}, -1)">-</button>
                <div class="qty-val" id="qty-${item.id}">0</div>
                <button class="qty-btn plus" onclick="updateQty(${item.id}, '${item.n}', ${item.p}, 1)">+</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(block);
  });
}

function updateQty(id, name, price, delta) {
  if (!carrito[id]) carrito[id] = { name, price, qty: 0 };
  carrito[id].qty += delta;
  if (carrito[id].qty <= 0) {
    carrito[id].qty = 0;
    delete carrito[id];
  }
  document.getElementById(`qty-${id}`).innerText = carrito[id] ? carrito[id].qty : 0;
  actualizarResumen();
}

function actualizarResumen() {
  const lista = document.getElementById('listaItems');
  let total = 0;
  let count = 0;
  lista.innerHTML = "";
  
  Object.values(carrito).forEach(item => {
    total += item.price * item.qty;
    count += item.qty;
    lista.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
      <span>${item.name} x${item.qty}</span>
      <span>$${(item.price * item.qty).toFixed(2)}</span>
    </div>`;
  });
  
  document.getElementById('totalVal').innerText = `$${total.toFixed(2)}`;
  document.getElementById('cartCount').innerText = count;
}

function enviarPedido() {
  const nombre = document.getElementById('nombre').value;
  const zona = document.getElementById('zona').value;
  if (!nombre || Object.keys(carrito).length === 0) {
    alert("Por favor añade productos y tu nombre.");
    return;
  }
  
  let msg = `🔥 *NUEVO PEDIDO - Javier Bear Grill* 🔥%0A%0A`;
  Object.values(carrito).forEach(i => msg += `• ${i.name} x${i.qty}%0A`);
  msg += `%0A👤 *Cliente:* ${nombre}%0A📍 *Zona:* ${zona}%0A💰 *Total:* ${document.getElementById('totalVal').innerText}`;
  
  window.open(`https://wa.me/50765738924?text=${msg}`);
}

renderMenu();
checkSchedule();
setInterval(checkSchedule, 60000);
</script>
</body>
</html>
