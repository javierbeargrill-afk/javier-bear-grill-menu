<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Javier Bear Grill 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --yellow: #f5c518; --yellow-dark: #d4a800;
    --green: #25D366; --text: #f0f0f0; --muted: #888;
    --border: #2e2e2e; --red: #ff4444;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; padding-bottom: 50px; }

  /* ALERTAS Y HORARIOS */
  #closedBanner { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
  #closedBanner.show { display: flex; }
  .closed-hours { margin: 20px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 15px; font-size: 15px; }
  .closed-hours span { color: var(--yellow); font-weight: 700; display: block; margin-top: 5px; font-size: 18px; }
  
  #scheduleBar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; font-size: 13px; font-weight: 700; position: sticky; top: 0; z-index: 900; }
  .open-bar { background: #0d2b1a; color: var(--green); border-bottom: 1px solid #1a4a2a; }
  .closed-bar { background: #2b0d0d; color: var(--red); border-bottom: 1px solid #4a1a1a; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .open-bar .dot { background: var(--green); animation: pulse 2s infinite; }
  .closed-bar .dot { background: var(--red); }
  @keyframes pulse { 0% {opacity:1} 50% {opacity:0.4} 100% {opacity:1} }

  /* DISEÑO MENU */
  header { text-align: center; padding: 25px 20px; background: linear-gradient(180deg, #1a0a00 0%, #0f0f0f 100%); }
  .header-title { font-family: 'Oswald', sans-serif; font-size: 32px; color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; }
  
  .category-block { margin: 10px 14px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .category-toggle { width: 100%; padding: 15px; background: var(--surface); border: none; color: var(--yellow); font-family: 'Oswald', sans-serif; text-align: left; font-size: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .category-body { display: none; padding: 10px; background: var(--bg); grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .category-body.open { display: grid; }
  
  .card { background: var(--surface); padding: 14px; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; }
  .card-name { font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 4px; line-height: 1.2; }
  .card-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.3; flex-grow: 1; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
  .card-price { color: var(--yellow); font-family: 'Oswald'; font-size: 17px; font-weight: 600; }
  
  .qty-controls { display: flex; align-items: center; background: var(--surface2); border-radius: 20px; border: 1px solid var(--border); height: 32px; }
  .qty-btn { width: 32px; height: 32px; border: none; background: none; color: var(--yellow); font-weight: bold; cursor: pointer; font-size: 18px; }
  .qty-btn.plus { background: var(--yellow); color: #000; border-radius: 0 20px 20px 0; }
  .qty-val { width: 28px; text-align: center; font-weight: 700; font-size: 14px; }

  /* CARRITO FORM */
  #carrito { padding: 20px; background: var(--surface); margin: 20px 14px 100px; border-radius: 15px; border: 1px solid var(--border); }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
  .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; }

  .btn-send { width: 100%; padding: 16px; background: var(--green); border: none; color: #fff; border-radius: 12px; font-family: 'Oswald'; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
  .btn-send:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed; }

  #floatCart { position: fixed; bottom: 20px; right: 20px; background: var(--yellow); color: #000; padding: 14px 24px; border-radius: 50px; font-weight: 800; box-shadow: 0 5px 20px rgba(0,0,0,0.5); border: none; cursor: pointer; z-index: 1000; font-family: 'Oswald'; font-size: 16px; }
</style>
</head>
<body>

<div id="closedBanner">
  <div style="font-size: 50px;">😴</div>
  <h2 style="font-family:'Oswald'; color:var(--yellow); margin-top:10px;">¡CERRADO AHORA!</h2>
  <div id="nextOpeningPopup" class="closed-hours">Calculando...</div>
  <button onclick="cerrarPopup()" style="background:none; border:2px solid var(--yellow); color:var(--yellow); padding:10px 20px; border-radius:30px; font-family:'Oswald'; cursor:pointer;">VER MENÚ</button>
</div>

<div id="scheduleBar">
  <div class="dot"></div>
  <span id="scheduleText">Cargando horario...</span>
</div>

<header>
  <h1 class="header-title">Javier Bear Grill</h1>
  <p style="color:var(--muted); font-size: 10px; letter-spacing: 3px; font-weight: 700;">LA VALDEZA, CHORRERA</p>
</header>

<div id="menuContainer"></div>

<button id="floatCart" onclick="document.getElementById('carrito').scrollIntoView({behavior:'smooth'})">🛒 MI CARRITO (<span id="cartCount">0</span>)</button>

<div id="carrito">
  <h3 style="font-family:'Oswald'; color:var(--yellow); margin-bottom:15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">RESUMEN DE PEDIDO</h3>
  <div id="listaItems" style="margin-bottom:20px;"></div>
  
  <div style="background:var(--surface2); padding:15px; border-radius:10px; margin-bottom:20px;">
    <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Subtotal:</span><span id="subtotalVal">$0.00</span></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Delivery:</span><span id="deliveryVal">$0.00</span></div>
    <div style="display:flex; justify-content:space-between; font-weight:800; font-size:20px; color:var(--yellow); margin-top:10px; border-top:1px solid var(--border); padding-top:10px;">
      <span>TOTAL:</span><span id="totalVal">$0.00</span>
    </div>
  </div>
  
  <div class="form-group"><label>Nombre Completo</label><input type="text" id="nombre"></div>
  <div class="form-group">
    <label>Zona de Entrega</label>
    <select id="zona" onchange="actualizarResumen()">
      <option value="La Valdeza">La Valdeza ($1.25)</option>
      <option value="Llano Largo">Llano Largo ($1.25)</option>
      <option value="Las Praderas">Las Praderas ($1.25)</option>
      <option value="Valle Bonito">Valle Bonito ($1.25)</option>
      <option value="Peñas Blancas">Peñas Blancas ($1.25)</option>
      <option value="Fuera de zona">Fuera de zona (A coordinar)</option>
    </select>
  </div>
  <div class="form-group"><label>Instrucciones</label><input type="text" id="notas" placeholder="Ej. Sin cebolla, casa cerca de..."></div>
  
  <button class="btn-send" id="btnEnviar" onclick="enviarPedido()">PEDIR POR WHATSAPP</button>
</div>

<script>
const HORARIOS = {
  5: { open: 15, close: 24, name: "Viernes" },
  6: { open: 13, close: 24, name: "Sábado" },
  0: { open: 13, close: 22, name: "Domingo" }
};

const CATEGORIAS = [
  { nombre: "🥳 Promociones", items: [
    {n:"Las tres Smash Burgers", p:11.99, d:"3 Smash Burgers de la casa al precio de una oferta."},
    {n:"Promo Brutalito", p:5.75, d:"Hamburguesa Brutalito + Papas + Soda."}
  ]},
  { nombre: "🍗 Pollos Asados", items: [
    {n:"1 pollo entero", p:9.00, d:"Pollo fresco marinado asado al carbón."},
    {n:"1/2 pollo asado", p:5.00, d:"Medio pollo asado al carbón."},
    {n:"1/4 de pollo asado", p:2.75, d:"Un cuarto de pollo asado."},
    {n:"COMBO 1/4 DE POLLO", p:5.00, d:"1/4 de pollo + Papas o Patacones + Soda."},
    {n:"COMBO MEDIO POLLO", p:7.50, d:"1/2 pollo + Papas o Patacones + Soda."},
    {n:"COMBO POLLO ENTERO", p:13.00, d:"Pollo entero + 2 acompañamientos + Soda 1.5L."}
  ]},
  { nombre: "🍔 Combos de Hamburguesas", items: [
    {n:"COMBO HAMBURGUESA LA GARRA", p:10.99, d:"Doble carne, tocino, queso, huevo y vegetales + Papas + Soda."},
    {n:"COMBO HAMBURGUESA SENCILLA", p:5.25, d:"Carne asada, vegetales y salsa + Papas + Soda."},
    {n:"COMBO DOBLE HAMBURGUESA", p:6.75, d:"Doble carne, vegetales y salsa + Papas + Soda."},
    {n:"COMBO TRIPLE HAMBURGUESA", p:10.25, d:"Triple carne, vegetales y salsa + Papas + Soda."},
    {n:"Queso Hamburguesa Combo", p:5.75, d:"Cheeseburger clásica + Papas + Soda."},
    {n:"Combo La Rompe Yema", p:6.49, d:"Carne, huevo frito con yema blanda + Papas + Soda."},
    {n:"Combo La Tableña", p:7.50, d:"Sabor criollo con queso blanco + Papas + Soda."}
  ]},
  { nombre: "🍔 Hamburguesas", items: [
    {n:"Hamburguesa Clásica", p:3.00, d:"Carne asada, pan brioche y vegetales."},
    {n:"Doble hamburguesa", p:4.75, d:"Doble carne asada, pan brioche y vegetales."},
    {n:"Triple hamburguesa", p:7.75, d:"Triple carne asada, pan brioche y vegetales."},
    {n:"La Garra", p:8.50, d:"Doble carne, tocino, queso y huevo frito."},
    {n:"Queso Hamburguesa", p:3.50, d:"Carne asada con extra queso cheddar."},
    {n:"La Rompe Yema", p:3.99, d:"Carne con huevo de yema blanda."},
    {n:"La Tableña Smash", p:4.99, d:"Smash con queso blanco nacional."}
  ]},
  { nombre: "🥩 Carnes y Cerdo", items: [
    {n:"Bistec de cinta asado", p:4.50, d:"Corte de cinta marinado y asado."},
    {n:"Costillita de cerdo asada", p:4.50, d:"Costillas de cerdo en su punto."},
    {n:"Costillas BBQ con arepas y patacón", p:8.75, d:"Costillas bañadas en BBQ con acompañamientos."},
    {n:"COMBO PUERCO AHUMADO", p:6.50, d:"Puerco ahumado + Acompañante + Soda."},
    {n:"COMBO CARNE AHUMADA", p:6.50, d:"Carne ahumada + Acompañante + Soda."}
  ]},
  { nombre: "🍖 Picadas", items: [
    {n:"Picada personal", p:9.75, d:"Variedad de carnes y frituras para uno."},
    {n:"Picada mixta para dos", p:15.99, d:"Ideal para compartir en pareja."},
    {n:"Picada mixta para cuatro", p:29.99, d:"Bandeja grande para amigos o familia."},
    {n:"Picada mixta fiesta", p:59.99, d:"Nuestra bandeja más grande para eventos."}
  ]},
  { nombre: "🌭 Salchipapas y Hotdogs", items: [
    {n:"Salchipapas gratinadas", p:6.50, d:"Papas, salchicha y mucho queso derretido."},
    {n:"Salchipapas con pollo", p:8.25, d:"Papas con salchicha y trozos de pollo asado."},
    {n:"Salchipapas mini", p:3.50, d:"Versión pequeña para antojos rápidos."},
    {n:"Salchipapas cargadas", p:10.50, d:"Pollo, carne, salchicha y salsas."},
    {n:"Carnipapas", p:10.50, d:"Papas fritas con trozos generosos de carne."},
    {n:"Choripapas", p:7.75, d:"Papas con chorizo criollo asado."},
    {n:"Hotdog Brutal", p:4.50, d:"Jumbo con toppings especiales."},
    {n:"Combo Hotdog Brutal", p:6.75, d:"Hotdog Brutal + Papas + Soda."},
    {n:"Hotdog clásico", p:2.50, d:"Salchicha clásica y salsas."},
    {n:"Combo Hotdog clásico", p:5.00, d:"Hotdog + Papas + Soda."}
  ]},
  { nombre: "🌭 Chorizos", items: [
    {n:"Chorizo criollo asado", p:1.75, d:"Un chorizo criollo artesanal."},
    {n:"COMBO CHORIZOS", p:5.25, d:"Tres chorizos asados + acompañamiento."},
    {n:"Paquete de Chorizo", p:6.50, d:"Para llevar y asar en casa."},
    {n:"Chorizo crudo", p:1.25, d:"Unidad de chorizo crudo."}
  ]},
  { nombre: "🍟 Acompañantes", items: [
    {n:"Papas fritas", p:1.75, d:"Porción individual crujiente."},
    {n:"Papas asadas con mojo de ajo", p:1.75, d:"Papas naturales asadas con salsa de ajo."},
    {n:"Patacones", p:1.75, d:"Plátano frito al momento."},
    {n:"Yuca frita", p:1.75, d:"Yuca crujiente."},
    {n:"Yuca al mojo", p:1.75, d:"Yuca hervida con aceite de ajo."},
    {n:"Arroz con pollo", p:2.50, d:"Receta casera panameña."},
    {n:"Arepas rellenas", p:2.25, d:"Relleno del día."}
  ]},
  { nombre: "➕ Extras", items: [
    {n:"Tocino ahumado", p:0.50, d:"Extra de tocino."},
    {n:"Queso mozarella extra", p:0.50, d:"Capa extra de queso."},
    {n:"Topping Pollo", p:1.50, d:"Adicional de pollo asado."}
  ]},
  { nombre: "🥤 Bebidas", items: [
    {n:"Cocacola", p:1.25, d:"Lata 355ml."},
    {n:"Agua en botella", p:1.00, d:"Agua purificada."},
    {n:"Jugos naturales", p:1.50, d:"Frutas de temporada."},
    {n:"Sodas Variadas", p:1.00, d:"Sabores disponibles."},
    {n:"Litro Soda Cocacola", p:2.75, d:"Botella 1L."},
    {n:"Fresca 1lt", p:2.75, d:"Botella 1L."},
    {n:"Soda manzana mini", p:1.00, d:"Envase pequeño."}
  ]},
  { nombre: "🥫 Salsas Extras", items: [
    {n:"Ketchup", p:0.50, d:"Porción extra."},
    {n:"Mostaza dulce", p:0.50, d:"Porción extra."},
    {n:"Mostaza", p:0.50, d:"Porción extra."},
    {n:"Mayonesa", p:0.50, d:"Porción extra."},
    {n:"Salsa de ajo", p:0.50, d:"Salsa de la casa."}
  ]},
  { nombre: "👶 Niños", items: [
    {n:"Combo nugget", p:5.50, d:"Nuggets de pollo + Papas + Jugo."}
  ]}
];

let carrito = {};
let popupForzado = false;

function formatHora(h) { return h > 12 ? (h - 12) + ":00 PM" : h + ":00 AM"; }

function checkSchedule() {
  const ahora = new Date();
  const dia = ahora.getDay();
  const hora = ahora.getHours();
  const hoy = HORARIOS[dia];
  const isOpen = hoy && hora >= hoy.open && hora < hoy.close;
  const bar = document.getElementById('scheduleBar');
  const txt = document.getElementById('scheduleText');
  const btn = document.getElementById('btnEnviar');
  const banner = document.getElementById('closedBanner');

  if (isOpen) {
    bar.className = "open-bar";
    txt.innerText = `🟢 ABIERTO · Cerramos a las ${formatHora(hoy.close)}`;
    btn.disabled = false;
    banner.classList.remove('show');
  } else {
    bar.className = "closed-bar";
    txt.innerText = `🔴 CERRADO ACTUALMENTE`;
    btn.disabled = true;
    if (!popupForzado) banner.classList.add('show');
    for(let i=0; i<7; i++){
      let dNext = (dia + i) % 7;
      if(HORARIOS[dNext]){
        document.getElementById('nextOpeningPopup').innerHTML = `Próxima apertura: <span>${HORARIOS[dNext].name} a las ${formatHora(HORARIOS[dNext].open)}</span>`;
        break;
      }
    }
  }
}

function cerrarPopup() { popupForzado = true; document.getElementById('closedBanner').classList.remove('show'); }

function renderMenu() {
  const container = document.getElementById('menuContainer');
  CATEGORIAS.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'category-block';
    block.innerHTML = `<button class="category-toggle" onclick="this.nextElementSibling.classList.toggle('open')">${cat.nombre} <span>▼</span></button>
      <div class="category-body">
        ${cat.items.map(item => {
          const id = item.n.replace(/[^a-zA-Z0-9]/g, '');
          return `
          <div class="card">
            <span class="card-name">${item.n}</span>
            <p class="card-desc">${item.d}</p>
            <div class="card-footer">
              <span class="card-price">$${item.p.toFixed(2)}</span>
              <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty('${id}', '${item.n}', ${item.p}, -1)">-</button>
                <div class="qty-val" id="qty-${id}">0</div>
                <button class="qty-btn plus" onclick="updateQty('${id}', '${item.n}', ${item.p}, 1)">+</button>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(block);
  });
}

function updateQty(id, name, price, delta) {
  if (!carrito[id]) carrito[id] = { name, price, qty: 0 };
  carrito[id].qty += delta;
  if (carrito[id].qty <= 0) delete carrito[id];
  document.getElementById(`qty-${id}`).innerText = carrito[id] ? carrito[id].qty : 0;
  actualizarResumen();
}

function actualizarResumen() {
  const lista = document.getElementById('listaItems');
  let subtotal = 0, count = 0;
  lista.innerHTML = "";
  Object.values(carrito).forEach(item => {
    subtotal += item.price * item.qty;
    count += item.qty;
    lista.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px;"><span>${item.name} (x${item.qty})</span><span>$${(item.price * item.qty).toFixed(2)}</span></div>`;
  });
  const zona = document.getElementById('zona').value;
  const delivery = (subtotal > 0 && zona !== "Fuera de zona") ? 1.25 : 0;
  document.getElementById('subtotalVal').innerText = `$${subtotal.toFixed(2)}`;
  document.getElementById('deliveryVal').innerText = (zona === "Fuera de zona") ? "A coord." : `$${delivery.toFixed(2)}`;
  document.getElementById('totalVal').innerText = `$${(subtotal + delivery).toFixed(2)}`;
  document.getElementById('cartCount').innerText = count;
}

function enviarPedido() {
  const nombre = document.getElementById('nombre').value;
  if (!nombre || Object.keys(carrito).length === 0) { alert("Completa tu nombre y elige tus productos."); return; }
  let msg = `🔥 *PEDIDO - Javier Bear Grill* 🔥%0A%0A`;
  Object.values(carrito).forEach(i => msg += `• ${i.name} (x${i.qty})%0A`);
  msg += `%0A👤 *Cliente:* ${nombre}%0A📍 *Zona:* ${document.getElementById('zona').value}%0A📝 *Notas:* ${document.getElementById('notas').value}%0A%0A💰 *TOTAL:* ${document.getElementById('totalVal').innerText}`;
  window.open(`https://wa.me/50765738924?text=${msg}`);
}

renderMenu();
checkSchedule();
setInterval(checkSchedule, 30000);
</script>
</body>
</html>
