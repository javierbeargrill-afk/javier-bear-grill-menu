<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Javier Bear Grill</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#111;
    color:white;
    padding-bottom:220px;
}

h1{
    text-align:center;
    padding:20px;
}

.menu{
    padding:20px;
}

.producto{
    background:#1e1e1e;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.precio{
    color:#ffcc00;
    font-weight:bold;
}

.cantidad-control{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
}

.cantidad-control button{
    background:#ffcc00;
    border:none;
    padding:5px 10px;
    font-size:16px;
    font-weight:bold;
    border-radius:5px;
    cursor:pointer;
}

.agregar-btn{
    background:#25D366;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.carrito{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    padding:15px;
    border-top:2px solid #ffcc00;
}

.item-carrito{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.item-carrito button{
    background:red;
    border:none;
    color:white;
    padding:3px 6px;
    border-radius:5px;
    cursor:pointer;
}

.total{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.enviar-btn{
    margin-top:10px;
    width:100%;
    background:#25D366;
    border:none;
    padding:10px;
    font-weight:bold;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🔥 Javier Bear Grill 🔥</h1>

<div class="menu">

<div class="producto" data-nombre="La Rompe Yema" data-precio="3.99">
<h3>La Rompe Yema</h3>
<p class="precio">$3.99</p>

<div class="cantidad-control">
<button onclick="cambiarCantidad(this,-1)">-</button>
<span class="cantidad">1</span>
<button onclick="cambiarCantidad(this,1)">+</button>
</div>

<button class="agregar-btn" onclick="agregarDesdeMenu(this)">Agregar</button>
</div>


<div class="producto" data-nombre="Combo La Rompe Yema" data-precio="6.49">
<h3>Combo La Rompe Yema</h3>
<p class="precio">$6.49</p>

<div class="cantidad-control">
<button onclick="cambiarCantidad(this,-1)">-</button>
<span class="cantidad">1</span>
<button onclick="cambiarCantidad(this,1)">+</button>
</div>

<button class="agregar-btn" onclick="agregarDesdeMenu(this)">Agregar</button>
</div>

</div>

<div class="carrito">
<h2>🛒 Carrito</h2>
<div id="lista-carrito"></div>
<div class="total">Total: $<span id="total">0.00</span></div>
<button class="enviar-btn" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
</div>

<script>

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardarCarrito(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

function cambiarCantidad(btn, cambio){
    const contenedor = btn.parentElement;
    const span = contenedor.querySelector(".cantidad");
    let cantidad = parseInt(span.innerText);
    cantidad += cambio;
    if(cantidad < 1) cantidad = 1;
    span.innerText = cantidad;
}

function agregarDesdeMenu(btn){
    const producto = btn.closest(".producto");
    const nombre = producto.dataset.nombre;
    const precio = parseFloat(producto.dataset.precio);
    const cantidad = parseInt(producto.querySelector(".cantidad").innerText);

    agregarAlCarrito(nombre, precio, cantidad);
    producto.querySelector(".cantidad").innerText = "1";
}

function agregarAlCarrito(nombre, precio, cantidad){
    const existente = carrito.find(item => item.nombre === nombre);
    if(existente){
        existente.cantidad += cantidad;
    }else{
        carrito.push({nombre, precio, cantidad});
    }
    actualizarCarrito();
}

function actualizarCarrito(){
    const lista = document.getElementById("lista-carrito");
    lista.innerHTML = "";
    let total = 0;

    carrito.forEach((item,index)=>{
        total += item.precio * item.cantidad;

        lista.innerHTML += `
        <div class="item-carrito">
            <span>${item.nombre} x${item.cantidad}</span>
            <button onclick="eliminarItem(${index})">X</button>
        </div>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
    guardarCarrito();
}

function eliminarItem(index){
    carrito.splice(index,1);
    actualizarCarrito();
}

function enviarWhatsApp(){
    if(carrito.length === 0){
        alert("El carrito está vacío");
        return;
    }

    let mensaje = "Hola, quiero hacer este pedido:%0A";
    carrito.forEach(item=>{
        mensaje += `${item.nombre} x${item.cantidad} - $${(item.precio*item.cantidad).toFixed(2)}%0A`;
    });

    mensaje += `%0ATotal: $${document.getElementById("total").innerText}`;

    window.open(`https://wa.me/50765738924?text=${mensaje}`);

    carrito = [];
    guardarCarrito();
    actualizarCarrito();
}

actualizarCarrito();

</script>

</body>
</html>
