<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javier Bear Grill</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
}

h1{
  text-align:center;
  padding:20px;
}

.category{
  border-bottom:1px solid #333;
}

.category-header{
  padding:15px;
  background:#1c1c1c;
  cursor:pointer;
  font-weight:bold;
}

.products{
  display:none;
  padding:10px;
}

.product{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  background:#1a1a1a;
  padding:10px;
  border-radius:6px;
}

.controls button{
  background:#ff9800;
  border:none;
  padding:5px 10px;
  margin:0 5px;
  color:white;
  font-weight:bold;
  border-radius:4px;
  cursor:pointer;
}

#viewCartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff9800;
  padding:12px 18px;
  border-radius:50px;
  font-weight:bold;
  cursor:pointer;
}

#cart{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:#222;
  padding:20px;
  transition:0.3s;
  overflow-y:auto;
}

#cart.open{
  right:0;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.total{
  margin-top:20px;
  font-size:18px;
  font-weight:bold;
}

button.send{
  width:100%;
  margin-top:15px;
  padding:10px;
  background:green;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.delivery-info{
  font-size:14px;
  margin-top:10px;
  color:#ccc;
}
</style>
</head>

<body>

<h1>🔥 Javier Bear Grill 🔥</h1>

<div id="menu"></div>

<div id="viewCartBtn">🛒 Ver Carrito (<span id="cartCount">0</span>)</div>

<div id="cart">
<h2>Tu Pedido</h2>
<div id="cartItems"></div>
<div class="delivery-info" id="deliveryInfo"></div>
<div class="total" id="totalPrice">$0.00</div>
<button class="send" onclick="sendOrder()">Enviar por WhatsApp</button>
</div>

<script>

const CONFIG = {
  whatsapp: "65738924",
  deliveryFee: 1.25,
  freeDeliveryFrom: 7.50,
  // minOrder: 5.00   // 🔒 Pedido mínimo desactivado por ahora
};

const PRODUCTS = {
  "Combos": [
    {id:1, name:"Combo Burger", price:6.00},
    {id:2, name:"Combo Doble", price:7.50}
  ],
  "Extras": [
    {id:3, name:"Papas", price:2.00},
    {id:4, name:"Soda", price:1.50}
  ]
};

let cart = JSON.parse(localStorage.getItem("cart")) || {};

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function renderMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  Object.keys(PRODUCTS).forEach(category=>{
    const categoryDiv = document.createElement("div");
    categoryDiv.className = "category";

    const header = document.createElement("div");
    header.className = "category-header";
    header.innerText = category;
    header.onclick = ()=>{
      productsDiv.style.display =
      productsDiv.style.display === "none" ? "block" : "none";
    };

    const productsDiv = document.createElement("div");
    productsDiv.className = "products";

    PRODUCTS[category].forEach(product=>{
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <div>${product.name} - $${product.price.toFixed(2)}</div>
        <div class="controls">
          <button onclick="updateQuantity(${product.id}, -1)">-</button>
          <span id="qty-${product.id}">${cart[product.id] || 0}</span>
          <button onclick="updateQuantity(${product.id}, 1)">+</button>
        </div>
      `;
      productsDiv.appendChild(div);
    });

    categoryDiv.appendChild(header);
    categoryDiv.appendChild(productsDiv);
    menu.appendChild(categoryDiv);
  });
}

function updateQuantity(id, change){
  if(!cart[id]) cart[id] = 0;
  cart[id] += change;

  if(cart[id] <= 0){
    delete cart[id];
  }

  saveCart();
  renderMenu();
  renderCart();
}

function renderCart(){
  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML = "";

  let subtotal = 0;
  let count = 0;

  Object.keys(cart).forEach(id=>{
    const product = Object.values(PRODUCTS)
    .flat()
    .find(p=>p.id == id);

    const quantity = cart[id];
    const total = product.price * quantity;

    subtotal += total;
    count += quantity;

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      ${product.name} x${quantity}
      <span>$${total.toFixed(2)}</span>
    `;
    cartItems.appendChild(div);
  });

  document.getElementById("cartCount").innerText = count;

  let delivery = 0;
  let deliveryText = "";

  if(subtotal >= CONFIG.freeDeliveryFrom && subtotal > 0){
    deliveryText = "🚚 Delivery GRATIS";
  }else if(subtotal > 0){
    delivery = CONFIG.deliveryFee;
    deliveryText = `🚚 Delivery $${CONFIG.deliveryFee.toFixed(2)}`;
  }

  document.getElementById("deliveryInfo").innerText = deliveryText;
  document.getElementById("totalPrice").innerText =
  "Total: $" + (subtotal + delivery).toFixed(2);
}

function sendOrder(){
  if(Object.keys(cart).length === 0){
    alert("El carrito está vacío");
    return;
  }

  let message = "🛒 Pedido Javier Bear Grill:\n\n";
  let subtotal = 0;

  Object.keys(cart).forEach(id=>{
    const product = Object.values(PRODUCTS)
    .flat()
    .find(p=>p.id == id);

    const quantity = cart[id];
    const total = product.price * quantity;

    subtotal += total;

    message += `${product.name} x${quantity} - $${total.toFixed(2)}\n`;
  });

  let delivery = 0;

  if(subtotal < CONFIG.freeDeliveryFrom){
    delivery = CONFIG.deliveryFee;
  }

  const finalTotal = subtotal + delivery;

  message += `\nSubtotal: $${subtotal.toFixed(2)}`;
  message += `\nDelivery: $${delivery.toFixed(2)}`;
  message += `\nTotal: $${finalTotal.toFixed(2)}`;

  const url = `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

document.getElementById("viewCartBtn").onclick = ()=>{
  document.getElementById("cart").classList.toggle("open");
};

renderMenu();
renderCart();

</script>

</body>
</html>
